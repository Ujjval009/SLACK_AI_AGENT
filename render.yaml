services:
  - type: web
    name: slack-ai-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: SLACK_PRIVATE_CHANNEL_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: COMPANY_NAME
        value: CloudNest Technologies
      - key: COMPANY_PRODUCT
        value: CloudNest Deploy — AI-powered Kubernetes autoscaling platform
      - key: NODE_ENV
        value: production
